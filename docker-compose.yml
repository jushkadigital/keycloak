version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres-keycloak
    restart: always

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c maintenance_work_mem=64MB
      -c random_page_cost=1.1
      -c wal_buffers=16MB
      -c max_connections=200

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-keycloak} -d ${POSTGRES_DB:-keycloak}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - keycloak-network

    mem_limit: 1024m
    mem_reservation: 512m
    pids_limit: 200

  keycloak:
    image: quay.io/phasetwo/phasetwo-keycloak:26.4.2
    container_name: keycloak-prod
    restart: unless-stopped

    env_file:
      - .env

    environment:
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"

      # IMPORTANTE:
      # cámbialo por tu dominio real
      KC_HOSTNAME: auth.patarutera.pe

      JAVA_OPTS: >
        -Xms512m
        -Xmx1024m
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
        -XX:+UseStringDeduplication
        -Djava.awt.headless=true

    depends_on:
      postgres:
        condition: service_healthy

    expose:
      - "8080"

    volumes:
      - ./themes/keycloak-theme-for-kc-all-other-versions.jar:/opt/keycloak/providers/keycloak-theme-for-kc-all-other-versions.jar:ro

    entrypoint: ["/bin/sh"]

    command: >
      -c "
      /opt/keycloak/bin/kc.sh build &&
      exec /opt/keycloak/bin/kc.sh start
      --optimized
      --log-level=ERROR,FATAL
      "

    networks:
      - keycloak-network
      - proxiable

    mem_limit: 1536m
    mem_reservation: 1024m
    pids_limit: 400

volumes:
  postgres_data:

networks:
  proxiable:
    external: true
    name: proxiable

  keycloak-network:
    driver: bridge
