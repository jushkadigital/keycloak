services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-keycloak
    restart: always

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    command: >
      postgres
      -c shared_buffers=384MB
      -c effective_cache_size=768MB
      -c maintenance_work_mem=128MB
      -c work_mem=16MB
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c wal_buffers=16MB
      -c max_connections=100
      -c fsync=on
      -c synchronous_commit=off
      -c checkpoint_timeout=10min
      -c checkpoint_completion_target=0.9
      -c max_wal_size=2GB
      -c default_statistics_target=100
      -c logging_collector=off
      -c log_min_messages=warning

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-keycloak} -d ${POSTGRES_DB:-keycloak}"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - keycloak-network

    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.0'
          pids: 200
        reservations:
          memory: 512M
          cpus: '0.5'

  keycloak:
    build:
      context: ./keycloak
      dockerfile: Dockerfile
    container_name: keycloak-prod
    restart: unless-stopped

    env_file:
      - .env

    environment:
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: https://auth.patarutera.pe

      KC_DB: postgres
      KC_DB_POOL_MIN_SIZE: 5
      KC_DB_POOL_MAX_SIZE: 50
      KC_DB_POOL_INITIAL_SIZE: 10

      KC_LOG_LEVEL: WARN

      QUARKUS_HTTP_LIMITS_MAX_CONNECTIONS: 500
      QUARKUS_HTTP_IDLE_TIMEOUT: 30S
      QUARKUS_TRANSACTION_MANAGER_ENABLE_RECOVERY: "false"

      JAVA_OPTS: >
        -XX:+UseContainerSupport
        -XX:InitialRAMPercentage=50.0
        -XX:MaxRAMPercentage=75.0
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=150
        -XX:+UseStringDeduplication
        -XX:+AlwaysPreTouch
        -Djava.awt.headless=true

    depends_on:
      postgres:
        condition: service_healthy

    expose:
      - "8080"
      - "9000"

    command:
      - start
      - --optimized
      - --http-enabled=true
      - --proxy-headers=xforwarded

    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s

    networks:
      - keycloak-network
      - proxiable

    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: '1.5'
          pids: 400
        reservations:
          memory: 1024M
          cpus: '1.0'

volumes:
  postgres_data:
    driver: local

networks:
  proxiable:
    external: true
    name: proxiable

  keycloak-network:
    driver: bridge
